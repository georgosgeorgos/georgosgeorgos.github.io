<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>$title$ — Giorgio Giannone</title>
    <link href="https://fonts.cdnfonts.com/css/ubuntu-mono" rel="stylesheet">
    <link rel="icon" href="../../../assets/me.png">
    <link rel="stylesheet" href="../../css/essay.css">
    <link rel="stylesheet" href="../../katex/katex.min.css">
$for(header-includes)$
    $header-includes$
$endfor$
</head>
<body>
    <nav class="essay-nav">
        <a href="../../../index.html">About</a>
        <span class="nav-divider">|</span>
        <span class="nav-group">
            <a href="../../index.html">Writing</a>
            <span class="nav-collapse">
                <a href="../../index.html?filter=essay">Essays</a>
                <a href="../../index.html?filter=note">Notes</a>
                <a href="../../index.html?filter=prediction">Predictions</a>
            </span>
        </span>
    </nav>

    <div class="essay-layout">
        <!-- Left: Table of Contents (auto-generated by JS) -->
        <aside class="essay-toc">
            <nav id="toc"></nav>
        </aside>

        <!-- Center: Main content -->
        <article class="essay-container">
            <header class="essay-header">
                <h1>$title$</h1>
                <div class="essay-meta">
$if(date)$
                    <span class="date">$date$</span>
$endif$
$if(category)$
                    <span> · <span class="tag">$category$</span></span>
$endif$
                </div>
            </header>

            $body$

            <footer class="essay-footer">
                <a href="../../index.html">← Back to all writing</a>
            </footer>
        </article>

        <!-- Right: Sidenotes column (content injected by JS) -->
        <aside class="essay-sidenotes"></aside>
    </div>

    <!-- KaTeX -->
    <script defer src="../../katex/katex.min.js"></script>
    <script defer src="../../katex/init.js"></script>

    <!-- medium-zoom for images -->
    <script src="https://cdn.jsdelivr.net/npm/medium-zoom@1.1.0/dist/medium-zoom.min.js"></script>
    <script>document.addEventListener('DOMContentLoaded', function() { mediumZoom('img'); });</script>

    <!-- TOC + sidenotes -->
    <script defer src="../../js/essay.js"></script>
</body>
</html>
