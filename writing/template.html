<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="author" content="Giorgio Giannone">
    <meta property="og:title" content="$title$ — Amortized Intuition">
    <meta property="og:type" content="article">
    <title>$title$ — Amortized Intuition</title>
    <link href="https://fonts.cdnfonts.com/css/ubuntu-mono" rel="stylesheet">
    <link rel="icon" href="../../../assets/me.png">
    <link rel="stylesheet" href="../../css/writing.css">
    <link rel="stylesheet" href="../../katex/katex.min.css">
$for(header-includes)$
    $header-includes$
$endfor$
</head>
<body>
    <nav class="essay-nav">
        <span class="nav-title">
            <a href="../../index.html"><strong>Amortized Intuition</strong></a>
        </span>
        <button class="nav-toggle" aria-label="Menu" aria-expanded="false">
            <span></span><span></span><span></span>
        </button>
        <span class="nav-links">
            <a href="../../../index.html">About</a>
            <span class="nav-divider">|</span>
            <span class="nav-group">
                <a href="../../index.html">Writing</a>
                <span class="nav-collapse">
                    <a href="../../index.html?filter=essay">Essays</a>
                    <a href="../../index.html?filter=note">Notes</a>
                    <a href="../../index.html?filter=prediction">Predictions</a>
                </span>
            </span>
        </span>
    </nav>

    <div class="essay-layout">
        <!-- Left: Table of Contents (auto-generated by JS) -->
        <aside class="essay-toc">
            <nav id="toc"></nav>
        </aside>

        <!-- Center: Main content -->
        <article class="essay-container">
            <header class="essay-header">
                <h1>$title$</h1>
                <div class="essay-meta">
$if(date)$
                    <span class="date">$date$</span>
$endif$
$if(category)$
                    <span> · <span class="tag">$category$</span></span>
$endif$
                </div>
            </header>

            $body$

            <footer class="essay-footer">
                <a href="../../index.html">← Back to all writing</a>
            </footer>
        </article>

        <!-- Right: Sidenotes column (content injected by JS) -->
        <aside class="essay-sidenotes"></aside>
    </div>

    <!-- Font Switcher (commented out — using Iowan Old Style)
    <div class="font-switcher">
        <div class="switcher-title">Body Font</div>
        <label><input type="radio" name="font" value="'EB Garamond', serif" checked> EB Garamond</label>
        <label><input type="radio" name="font" value="'Crimson Text', serif"> Crimson Text</label>
        <label><input type="radio" name="font" value="'Lora', serif"> Lora</label>
        <label><input type="radio" name="font" value="'Libre Baskerville', serif"> Libre Baskerville</label>
        <label><input type="radio" name="font" value="'Cormorant Garamond', serif"> Cormorant Garamond</label>
        <label><input type="radio" name="font" value="'Iowan Old Style BT', 'Iowan Old Style', Georgia, serif"> Iowan Old Style</label>
        <label><input type="radio" name="font" value="'Inter', sans-serif"> Inter</label>
    </div>
    <script>
    document.querySelectorAll('.font-switcher input[name="font"]').forEach(function(radio) {
        radio.addEventListener('change', function() {
            document.body.style.fontFamily = this.value;
        });
    });
    </script>
    -->

    <script>
    (function() {
        var toggle = document.querySelector('.nav-toggle');
        var nav = document.querySelector('.essay-nav');
        toggle.addEventListener('click', function() {
            var open = nav.classList.toggle('nav-open');
            toggle.setAttribute('aria-expanded', open);
        });
    })();
    </script>

    <!-- KaTeX -->
    <script defer src="../../katex/katex.min.js"></script>
    <script defer src="../../katex/init.js"></script>

    <!-- medium-zoom for images -->
    <script src="https://cdn.jsdelivr.net/npm/medium-zoom@1.1.0/dist/medium-zoom.min.js"></script>
    <script>document.addEventListener('DOMContentLoaded', function() { mediumZoom('img'); });</script>

    <!-- TOC + sidenotes -->
    <script defer src="../../js/writing.js"></script>
    <script>
    if (location.protocol !== 'file:' && location.pathname.endsWith('/index.html'))
        history.replaceState(null, '', location.pathname.slice(0, -10) + location.search + location.hash);
    </script>
</body>
</html>
